<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Experiment Five — Compare A/B</title>
    <link rel="stylesheet" href="showcase.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Experiment Five · Compare (A/B swipe)</h1>
      <nav class="viewnav">
        <a href="index.html">Stage</a>
        <a href="switch.html">Switcher</a>
        <a href="compare.html" class="active">Compare (A/B)</a>
      </nav>
    </header>

    <div class="toolbar">
      <label class="sel">Left (A) <select id="selA"></select></label>
      <label class="sel">Right (B) <select id="selB"></select></label>
      <div class="tool-sep"></div>
      <label class="toggle"><input type="checkbox" id="bg" /> Reference bg</label>
      <label class="toggle"><input type="checkbox" id="text" /> Show text</label>
      <button class="btn" id="center">↔ Center</button>
      <button class="btn" id="shot">📷 Save screenshot</button>
      <button class="btn" id="fs">⛶ Fullscreen</button>
      <span class="hint">Drag the divider to wipe A↔B at the same position · reference shown beneath.</span>
    </div>

    <div class="stagewrap stagewrap--fill" id="stagewrap">
      <div class="scene" id="scene">
        <div class="stage" id="stage">
          <div class="divider" id="divider"><div class="divider__handle">⇆</div></div>
        </div>
        <div class="col__cap">reference</div>
        <img class="cmp-ref" src="reference.png" alt="reference" />
      </div>
    </div>

    <script type="module" src="compare.js"></script>
  </body>
</html>
