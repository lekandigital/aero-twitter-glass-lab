<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Experiment Five — Showcase</title>
    <link rel="stylesheet" href="showcase.css" />
  </head>
  <body>
    <header class="bar">
      <h1>Experiment Five</h1>
      <div class="modes">
        <button id="mFocus" class="mode is-active">Focus</button>
        <button id="mGrid" class="mode">Grid</button>
      </div>
      <div class="spacer"></div>
      <div class="bar__ctl" id="ctl"></div>
      <button id="shot" class="iconbtn" title="Save screenshot">📷</button>
      <button id="full" class="iconbtn" title="Fullscreen">⛶</button>
    </header>

    <main class="work">
      <aside class="rail" id="rail" aria-label="Branches"></aside>
      <section class="stagewrap" id="stagewrap">
        <div class="stage" id="stage"></div>
      </section>
    </main>

    <div class="viewer-hint">← → switch · S screenshot · R reference between · Esc exit</div>

    <script type="module" src="app.js"></script>
  </body>
</html>
