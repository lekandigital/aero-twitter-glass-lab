<!--this is the important part-->
<svg>
    <filter id="liquid-glass-filter" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence baseFrequency="0 0" numOctaves="1" seed="1" stitchTiles="noStitch" type="fractalNoise" result="turbulence"></feTurbulence>
        <feGaussianBlur in="turbulence" stdDeviation="0 0" result="blur"></feGaussianBlur>
        <feDisplacementMap in="SourceGraphic" in2="blur" scale="0" xChannelSelector="R" yChannelSelector="R"></feDisplacementMap>
    </filter>
</svg>

<!--this is not important-->
<div class="background"></div>

<button id="liquidButton">
    <span class="liquid-glass-filter"></span>
    <span>Drag me</span>
</button>

<div class="box-container left">
    <details class="box" open>
        <summary class="title">About</summary>
        <div class="details-container">
        <div class="group-input-container">
            <p>Adjust the sliders to obtain the desired effect. Copy the SVG code and integrate it into your code.</p>
        </div>
        </div>
    </details>
    <details class="box">
        <summary class="title">Demo</summary>
        <div class="details-container">
        <div class="group-input-container">
            <div class="label-container">
                <label for="background">Background</label>
            </div>
            <div class="input-container">
                <select id="background">
                    <option value="https://images.unsplash.com/photo-1673058256126-1db18edc7a2d">Image</option>
                    <option value="https://images.unsplash.com/photo-1516205651411-aef33a44f7c2">Image</option>
                    <option value="https://images.unsplash.com/photo-1756129725795-127bef414c6c">Image</option>
                    <option value="https://videos.pexels.com/video-files/854695/854695-hd_1920_1080_30fps.mp4">Video</option>
                </select>
            </div>
        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="buttonColor">Button color</label>
            </div>
            <div class="input-container">
                <select id="buttonColor">
                    <option value="white">White</option>
                    <option value="gray">Gray</option>
                    <option value="black">Black</option>
                </select>
            </div>
        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="buttonWidth">Button width</label>
            </div>
            <div class="input-container">
                <input id="buttonWidth" type="range" min="200" max="300" step="1" value="200"><span class="value">200</span>
            </div>
        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="buttonHeight">Button height</label>
            </div>
            <div class="input-container">
                <input id="buttonHeight" type="range" min="100" max="300" step="1" value="100"><span class="value">100</span>
            </div>
        </div>
            </div>
    </details>

    <details class="box">
        <summary class="title">Turbulence</summary>
        <div class="details-container">
        <div class="group-input-container">
            <div class="label-container">
                <label for="baseFrequencyH">baseFrequencyH</label>
            </div>
            <div class="input-container">
                <input id="baseFrequencyH" type="range" min="0" max="1" step=".0001" value="0"><span class="value">0</span>
            </div>
        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="baseFrequencyV">baseFrequencyV</label>
            </div>
            <div class="input-container">
                <input id="baseFrequencyV" type="range" min="0" max="1" step=".0001" value="0"><span class="value">0</span>
            </div>
        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="numOctaves">numOctaves</label>
            </div>
            <div class="input-container">
                <input id="numOctaves" type="range" min="1" max="10" step="1" value="1"><span class="value">1</span>
            </div>
        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="seed">seed</label>
            </div>
            <div class="input-container">
                <input id="seed" type="range" min="1" max="100" step="1" value="1"><span class="value">1</span>
            </div>
        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="stitch">Stitch</label>
            </div>
            <div class="input-container">
                <select id="stitch">
                    <option value="noStitch" selected>noStitch</option>
                    <option value="stitch">stitch</option>

        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="type">type</label>
            </div>
            <div class="input-container">
                <select id="type">

        </div>
        </div>

    <details class="box">

        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="stdDeviationV">stdDeviationV</label>
            </div>

                <input id="stdDeviationV" type="range" min="0" max="20" step="1" value="0"><span class="value">0</span>

        </div>
        </div>

    <details class="box">

        </div>
        <div class="group-input-container">
            <div class="label-container">
                <label for="xChannelSelector">xChannelSelector</label>
            </div>
            <div class="input-container">
                <select id="xChannelSelector">
                    <option value="R" selected>R</option>
                    <option value="G">G</option>
                    <option value="B">B</option>
                    <option value="A">A</option>

        </div>

</div>
